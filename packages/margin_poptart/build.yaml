# Read about `build.yaml` at https://pub.dev/packages/build_config
# To update generated code, run `dart run build_runner build`
targets:
  $default:
    builders:
      json_serializable:
        options:
          any_map: true
          checked: true
          create_to_json: true
          explicit_to_json: true

      source_gen|combining_builder:
        options:
          ignore_for_file:
          - non_constant_identifier_names
